<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | Dozers &amp; Diggers</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#F8F3EA; color:#2B2620; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#FFFDF8; border:1px solid #E6DCC9; border-radius:24px; max-width:560px; width:100%;
            padding:56px 40px; text-align:center; box-shadow:0 12px 40px rgba(43,38,32,0.08); }
    .badge { width:56px; height:56px; border-radius:16px; background:#E8A33D; color:#2B2620; font-weight:800;
             font-size:22px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
    h1 { font-size:34px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:16px; }
    p { font-size:17px; line-height:1.6; color:#5C5344; margin-bottom:14px; }
    .phone { font-weight:700; color:#2B2620; }
    a.btn { display:inline-block; margin-top:22px; background:#E8A33D; color:#2B2620; text-decoration:none;
            font-weight:700; font-size:16px; padding:15px 34px; border-radius:999px; }
    .stripe { height:8px; border-radius:8px; margin-top:34px;
              background:repeating-linear-gradient(-45deg,#E8A33D 0 16px,#F8F3EA 16px 32px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">DD</div>
    <h1>Thanks &mdash; your request is in!</h1>
    <p>We've received your party details and just sent a confirmation to your email.</p>
    <p>We'll personally follow up within <strong>24 hours</strong> to lock in your date. Need us sooner? Call or text <span class="phone">(757) 453-3186</span>.</p>
    <a class="btn" href="https://dozersanddiggers.com">Back to home</a>
    <div class="stripe"></div>
  </div>
</body>
</html>
