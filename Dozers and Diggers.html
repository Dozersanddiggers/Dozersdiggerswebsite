  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 62px; line-height: 1.02; letter-spacing: -0.025em; margin: 0; text-wrap: balance\">We bring the dig site to your driveway.<\u002Fh1>\n      <p style=\"font-size: 19px; line-height: 1.6; color: #5C5344; margin: 0; max-width: 46ch; text-wrap: pretty\">A hands-on construction play zone — kid-sized excavators, dump trucks, and a builder wall — delivered and hosted at your party, anywhere in Hampton Roads.<\u002Fp>\n      <div style=\"display: flex; align-items: center; gap: 14px\">\n        <a href=\"#contact\" style=\"background: #2B2620; color: #F8F3EA; text-decoration: none; font-weight: 700; font-size: 16px; padding: 16px 32px; border-radius: 999px; transition: transform 0.15s ease\" style-hover=\"transform: scale(1.04)\">Book Your Party<\u002Fa>\n        <a href=\"#how-it-works\" style=\"color: #2B2620; text-decoration: none; font-weight: 600; font-size: 16px; padding: 16px 24px; border-radius: 999px; border: 1.5px solid #D8CCB6\" style-hover=\"border-color: #2B2620\">See how it works<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 22px; font-size: 14px; font-weight: 600; color: #7A6F5D\">\n        <span>Ages 2–8<\u002Fspan>\n        <span style=\"color: #D8CCB6\">•<\u002Fspan>\n        <span>Party host included<\u002Fspan>\n        <span style=\"color: #D8CCB6\">•<\u002Fspan>\n        <span>We handle cleanup<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position: relative\">\n      <img src=\"d4e7b1a4-5a32-47f3-8f1d-8ad30fecb686\" alt=\"Illustration of a kid-sized excavator digging a sand mound\" style=\"width: 100%; height: 480px; display: block; object-fit: cover; border-radius: 26px\">\n      <div style=\"position: absolute; left: -22px; bottom: 30px; background: #FFFDF8; border: 1px solid #E6DCC9; border-radius: 16px; padding: 14px 20px; box-shadow: 0 12px 30px rgba(43,38,32,0.12); display: flex; align-items: center; gap: 12px\">\n        <span style=\"width: 10px; height: 10px; border-radius: 50%; background: var(--accent, #E8A33D)\"><\u002Fspan>\n        <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 16px\">Build · Dig · Create<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <sc-if value=\"{{ showStripes }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"height: 8px; background: repeating-linear-gradient(-45deg, var(--accent, #E8A33D) 0 16px, #2B2620 16px 32px)\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ EXPERIENCE ============ -->\n  <section id=\"experience\" data-screen-label=\"The Experience\" style=\"background: #FFFDF8; border-bottom: 1px solid #E6DCC9\">\n    <div style=\"max-width: 1160px; margin: 0 auto; padding: 88px 32px\">\n      <div style=\"display: flex; flex-direction: column; gap: 14px; max-width: 60ch; margin-bottom: 52px\">\n        <span style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #8A6A2F\">The Experience<\u002Fspan>\n        <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 42px; letter-spacing: -0.02em; line-height: 1.08; margin: 0\">A real construction zone, scaled down to size<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #5C5344; margin: 0; text-wrap: pretty\">Our enclosed play trailer opens into a hands-on job site where little builders scoop, haul, and stack — together, like a real crew.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px\">\n        <div style=\"display: flex; flex-direction: column; gap: 18px\">\n          <img src=\"80856a99-7940-4674-ae4d-9b514207cd91\" alt=\"Illustration of a mini excavator\" style=\"width: 100%; height: 220px; display: block; object-fit: cover; border-radius: 18px\">\n          <div style=\"display: flex; flex-direction: column; gap: 8px\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 14px; color: #8A6A2F\">01<\u002Fspan>\n            <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 23px; margin: 0; letter-spacing: -0.01em\">Kid-Sized Excavators<\u002Fh3>\n            <p style=\"font-size: 15.5px; line-height: 1.6; color: #5C5344; margin: 0; text-wrap: pretty\">Kids hop on and dig into the sand just like real operators — scooping, swinging, and loading trucks while building coordination and teamwork.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 18px\">\n          <img src=\"8383f556-2d99-4dfa-ada8-4ffaea84f16e\" alt=\"Illustration of a dump truck and dozer\" style=\"width: 100%; height: 220px; display: block; object-fit: cover; border-radius: 18px\">\n          <div style=\"display: flex; flex-direction: column; gap: 8px\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 14px; color: #8A6A2F\">02<\u002Fspan>\n            <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 23px; margin: 0; letter-spacing: -0.01em\">Dozers &amp; Dump Trucks<\u002Fh3>\n            <p style=\"font-size: 15.5px; line-height: 1.6; color: #5C5344; margin: 0; text-wrap: pretty\">A fleet of push-along dozers and dump trucks for hauling sand, grading roads, and running their own job site from end to end.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 18px\">\n          <img src=\"0e53d925-4fea-4777-93d5-7fd9eb699595\" alt=\"Illustration of a colorful brick builder wall\" style=\"width: 100%; height: 220px; display: block; object-fit: cover; border-radius: 18px\">\n          <div style=\"display: flex; flex-direction: column; gap: 8px\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weigh for the full two hours<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 14px\">\n            <span style=\"width: 26px; height: 26px; border-radius: 50%; background: var(--accent, #E8A33D); color: #2B2620; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0\">✓<\u002Fspan>\n            <span style=\"font-size: 16.5px; font-weight: 500\">Safe, age-appropriate equipment for ages 2–8<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 14px\">\n            <span style=\"width: 26px; height: 26px; border-radius: 50%; background: var(--accent, #E8A33D); color: #2B2620; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0\">✓<\u002Fspan>\n            <span style=\"font-size: 16.5px; font-weight: 500\">Zero-stress setup and cleanup — we do all of it<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 14px\">\n            <span style=\"width: 26px; height: 26px; border-radius: 50%; background: var(--accent, #E8A33D); color: #2B2620; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0\">✓<\u002Fspan>\n            <span style=\"font-size: 16.5px; font-weight: 500\">Perfect for birthdays, school events, and playdates<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 18px\">\n        <img src=\"7e712ab8-5cf3-481a-aed5-72c13bcc81f7\" alt=\"Illustration of a traffic cone and hard hat\" style=\"width: 100%; height: 420px; display: block; margin-top: 28px; object-fit: cover; border-radius: 18px\">\n        <img src=\"950cd27a-6ffc-4d9f-83bb-093dbb9534e2\" alt=\"Illustration of the Dozers and Diggers trailer\" style=\"width: 100%; height: 420px; display: block; object-fit >\n        <div style=\"display: flex; align-items: center; gap: 18px; margin-top: 6px\">\n          <a href=\"#contact\" style=\"background: var(--accent, #E8A33D); color: #2B2620; text-decoration: none; font-weight: 700; font-size: 16px; padding: 15px 30px; border-radius: 999px; transition: transform 0.15s ease\" style-hover=\"transform: scale(1.04)\">Check Your Date<\u002Fa>\n          <span style=\"font-size: 14px; color: rgba(248,243,234,0.65)\">Now booking parties across Hampton Roads<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: rgba(248,243,234,0.07); border: 1px solid rgba(248,243,234,0.18); border-radius: 20px; padding: 32px; display: flex; flex-direction: column; gap: 18px\">\n        <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 20px; margin: 0\">Party day requirements<\u002Fh3>\n        <div style=\"display: flex; flex-direction: column; gap: 12px; font-size: 15.5px; line-height: 1.5; color: rgba(248,243,234,0.85)\">\n          <div style=\"display: flex; gap: 12px\"><span style=\"font-weight: 700; color: var(--accent, #E8A33D)\">40 ft<\u002Fspan><span>of space for the truck and trailer<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 12px\"><span style=\"font-weight: 700; color: var(--accent, #E8A33D)\">Flat<\u002Fspan><span>driveway, parking area, or street access<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 12px\"><span style=\"font-weight: 700; color: var(--accent, #E8A33D)\">Clear<\u002Fspan><span>path for setup — about 9 ft of width<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; font-weight: 600; margin: 0; padding-top: 6px; border-top: 1px solid rgba(248,243,234,0.18)\">We handle everything else.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PRICING ============ -->\n  <section id=\"pricing\" data-screen-label=\"Pricing\" style=\"background: #FFFDF8; border-top: 1px solid #E6DCC9; border-bottom: 1px solid #E6DCC9\">\n    <div style=\"max-width: 1160px; margin: 0 auto; padding: 88px 32px\">\n      <div style=\"display: flex; flex-direction: column; gap: 14px; max-width: 60ch; margin-bottom: 52px\">\n        <span style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #8A6A2F\">Pricing<\u002Fspan>\n        <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 42px; letter-spacing: -0.02em; line-height: 1.08; margin: 0\">Simple, flat pricing<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #5C5344; margin: 0; text-wrap: pretty\">One package, everything included. Add time if the crew isn't ready to clock out.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; align-items: stretch\">\n        <div style=\"background: #FFFDF8; border: 2px solid var(--accent, #E8A33D); border-radius: 22px; padding: 34px; display: flex; flex-direction: column; gap: 18px; position: relative\">\n          <span style=\"position: absolute; top: -14px; left: 30px; background: var(--accent, #E8A33D); color: #2B2620; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 14px; border-radius: 999px\">The Party Package<\u002Fspan>\n          <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 21px; margin: 8px 0 0\">Signature Build Party<\u002Fh3>\n          <div style=\"display: flex; align-items: baseline; gap: 8px\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 54px; letter-spacing: -0.02em; line-height: 1\">$399<\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 600; color: #7A6F5D\">/ 2-hour party<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 11px; font-size: 15.5px; color: #5C5344\">\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Up to 12 little builders<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Dedicated party host<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Delivery, setup &amp; cleanup included<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Excavators, trucks &amp; builder wall<\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"#contact\" style=\"margin-top: auto; background: #2B2620; color: #F8F3EA; text-decoration: none; text-align: center; font-weight: 700; font-size: 15.5px; padding: 14px 26px; border-radius: 999px; transition: transform 0.15s ease\" style-hover=\"transform: scale(1.03)\">Book your date<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"background: #FFFDF8; border: 1px solid #E6DCC9; border-radius: 22px; padding: 34px; display: flex; flex-direction: column; gap: 18px\">\n          <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 21px; margin: 8px 0 0\">Keep Digging<\u002Fh3>\n          <div style=\"display: flex; align-items: baseline; gap: 8px\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 54px; letter-spacing: -0.02em; line-height: 1\">$150<\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 600; color: #7A6F5D\">/ extra hour<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 11px; font-size: 15.5px; color: #5C5344\">\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Extend the dig on party day<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Same host, same full setup<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Add when you book, or ask on the day<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin-top: auto; margin-bottom: 0; font-size: 14px; color: #7A6F5D; text-align: center; padding: 14px 0\">Subject to schedule availability<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #FFFDF8; border: 1px solid #E6DCC9; border-radius: 22px; padding: 34px; display: flex; flex-direction: column; gap: 18px\">\n          <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 21px; margin: 8px 0 0\">Events &amp; Groups<\u002Fh3>\n          <div style=\"display: flex; align-items: baseline; gap: 8px\">\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 54px; letter-spacing: -0.02em; line-height: 1\">Custom<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 11px; font-size: 15.5px; color: #5C5344\">\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Church &amp; community events<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Schools, daycares &amp; PTAs<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Festivals &amp; block parties<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 10px\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: var(--accent, #E8A33D); flex-shrink: 0\"><\u002Fspan>Multi-hour &amp; multi-day options<\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"mailto:hello@dozersanddiggers.com\" style=\"margin-top: auto; background: none; color: #2B2620; text-decoration: none; text-align: center; font-weight: 700; font-size: 15.5px; padding: 13px 26px; border-radius: 999px; border: 1.5px solid #D8CCB6\" style-hover=\"border-color: #2B2620\">Request a quote<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 14px; color: #7A6F5D; margin: 28px 0 0\">Travel included across Hampton Roads — a small travel fee may apply farther out.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FAQ ============ -->\n  <section id=\"faqs\" data-screen-label=\"FAQs\" style=\"max-width: 820px; margin: 0 auto; padding: 24px 32px 96px\">\n    <div style=\"display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px\">\n      <span style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #8A6A2F\">FAQs<\u002Fspan>\n      <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 42px; letter-spacing: -0.02em; line-height: 1.08; margin: 0\">Frequently asked questions<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column\">\n      <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"6\">\n        <div style=\"border-bottom: 1px solid #E6DCC9\">\n          <button onclick=\"{{ faq.toggle }}\" style=\"width: 100%; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 22px 4px; text-align: left; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 19px; color: #2B2620\">\n            <span>{{ faq.q }}<\u002Fspan>\n            <span style=\"font-weight: 400; font-size: 26px; color: #8A6A2F; flex-shrink: 0\">{{ faq.sign }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ faq.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-size: 16px; line-height: 1.65; color: #5C5344; margin: 0; padding: 0 4px 24px; max-width: 62ch; text-wrap: pretty\">{{ faq.a }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER / CTA ============ -->\n  <footer id=\"contact\" data-screen-label=\"Footer\" style=\"background: #2B2620; color: #F8F3EA\">\n    <sc-if value=\"{{ showStripes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"height: 8px; background: repeating-linear-gradient(-45deg, var(--accent, #E8A33D) 0 16px, #2B2620 16px 32px)\"><\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"max-width: 1160px; margin: 0 auto; padding: 88px 32px 40px; display: flex; flex-direction: column; gap: 64px\">\n      <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 40px; flex-wrap: wrap\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px\">\n          <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 46px; letter-spacing: -0.02em; line-height: 1.05; margin: 0; text-wrap: balance\">Ready to break ground?<\u002Fh2>\n          <p style=\"font-size: 17px; color: rgba(248,243,234,0.7); margin: 0\">Give your kid a party they'll never forget. Check your date today.<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"mailto:hello@dozersanddiggers.com\" style=\"background: var(--accent, #E8A33D); color: #2B2620; text-decoration: none; font-weight: 700; font-size: 17px; padding: 18px 38px; border-radius: 999px; transition: transform 0.15s ease; flex-shrink: 0\" style-hover=\"transform: scale(1.04)\">Book a Party<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 48px; padding-top: 48px; border-top: 1px solid rgba(248,243,234,0.15)\">\n        <div style=\"display: flex; flex-direction: column; gap: 14px\">\n          <div style=\"display: flex; align-items: center; gap: 12px\">\n            <span style=\"width: 30px; height: 30px; border-radius: 8px; background: var(--accent, #E8A33D); display: flex; align-items: center; justify-content: center; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 13px; color: #2B2620\">DD<\u002Fspan>\n            <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 18px\">Dozers &amp; Diggers<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size: 15px; line-height: 1.6; color: rgba(248,243,234,0.6); margin: 0; max-width: 36ch\">The mobile construction play experience, delivered to parties across Norfolk and Hampton Roads, Virginia.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 12px; font-size: 15px\">\n          <span style=\"font-weight: 700; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(248,243,234,0.5)\">Explore<\u002Fspan>\n          <a href=\"#experience\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">The Experience<\u002Fa>\n          <a href=\"#how-it-works\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">How It Works<\u002Fa>\n          <a href=\"#package\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">Parties<\u002Fa>\n          <a href=\"#pricing\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">Pricing<\u002Fa>\n          <a href=\"#faqs\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">FAQs<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 12px; font-size: 15px\">\n          <span style=\"font-weight: 700; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(248,243,234,0.5)\">Contact<\u002Fspan>\n          <span style=\"color: rgba(248,243,234,0.85)\">Norfolk, Virginia<\u002Fspan>\n          <a href=\"tel:757-555-0148\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">(757) 555-0148<\u002Fa>\n          <a href=\"mailto:hello@dozersanddiggers.com\" style=\"color: rgba(248,243,234,0.85); text-decoration: none\" style-hover=\"color: #F8F3EA\">hello@dozersanddiggers.com<\u002Fa>\n          <div style=\"display: flex; gap: 16px; padding-top: 4px\">\n            <a href=\"#\" style=\"color: rgba(248,243,234,0.85); text-decoration: none; font-weight: 600\" style-hover=\"color: #F8F3EA\">Instagram<\u002Fa>\n            <a href=\"#\" style=\"color: rgba(248,243,234,0.85); text-decoration: none; font-weight: 600\" style-hover=\"color: #F8F3EA\">Facebook<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 13px; color: rgba(248,243,234,0.4); margin: 0; padding-top: 8px\">© 2026 Dozers &amp; Diggers. All rights reserved. · Serving Norfolk, Virginia Beach, Chesapeake, Portsmouth &amp; Suffolk.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E8A33D&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#E8A33D&quot;, &quot;#DE6A33&quot;, &quot;#EFBF3C&quot;], &quot;section&quot;: &quot;Theme&quot; },\n  &quot;panelTone&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;forest&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;forest&quot;, &quot;ink&quot;], &quot;section&quot;: &quot;Theme&quot; },\n  &quot;showStripes&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Theme&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n\n  applyTheme() {\n    const root = document.documentElement;\n    root.style.setProperty('--accent', this.props.accentColor ?? '#E8A33D');\n    const tone = this.props.panelTone ?? 'forest';\n    root.style.setProperty('--panel', tone === 'ink' ? '#3A342C' : '#35523F');\n  }\n\n  componentDidMount() { this.applyTheme(); }\n  componentDidUpdate() { this.applyTheme(); }\n\n  renderVals() {\n    const data = [\n      { q: 'What is Dozers & Diggers?', a: 'We are a mobile construction-themed play experience for kids\\' parties and events, based in Norfolk, Virginia. We bring a mini dig site with kid-sized excavators, dump trucks, sensory sand, and a builder wall — kids dig, scoop, haul, and build for the whole party.' },\n      { q: 'What ages is it best for?', a: 'The play zone is designed for children ages 2 to 8. Younger kids love the sensory sand play, while older kids gravitate to operating the excavators and running the truck fleet.' },\n      { q: 'Where do you travel?', a: 'We serve all of Hampton Roads — Norfolk, Virginia Beach, Chesapeake, Portsmouth, Suffolk, Hampton, and Newport News. Events farther out are usually possible with a small travel fee; just ask.' },\n      { q: 'How much space do we need?', a: 'Our enclosed trailer arrives with a truck, so we need about 40 feet of flat space — a driveway, parking area, or street frontage works great — plus roughly 9 feet of width clearance. Not sure your space works? Send us a photo and we\\'ll confirm.' },\n      { q: 'Do you handle setup and cleanup?', a: 'Yes — delivery, setup, hosting, and cleanup are all included. You plan the cake and the guest list; we do the rest.' },\n      { q: 'What if it rains?', a: 'The play zone is inside our enclosed trailer, so light weather is no problem. For severe weather we offer free rescheduling — we\\'ll work with you to find a new date.' },\n      { q: 'What kinds of events do you serve?', a: 'Birthday parties are our specialty, but we also do school and daycare events, neighborhood block parties, community festivals, and playdates.' },\n    ];\n    const faqs = data.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      open: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? '\\u2212' : '+',\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n    return {\n      faqs,\n      showStripes: this.props.showStripes ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
